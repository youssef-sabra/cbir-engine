# Alembic configuration for catalog-service.
# The database URL comes from the DATABASE_URL environment variable
# (see catalog_service/infrastructure/persistence/migrations/env.py);
# sqlalchemy.url below is only a last-resort fallback for local use.

[alembic]
script_location = catalog_service/infrastructure/persistence/migrations
prepend_sys_path = .
sqlalchemy.url = postgresql+psycopg://cbir:cbir_local_dev_password@localhost:5432/cbir
