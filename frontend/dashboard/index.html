<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>CBIR Engine — Dashboard</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header>
      <h1>CBIR Engine</h1>
      <span class="tagline">self-serve dashboard</span>
    </header>

    <section class="card" id="connect">
      <h2>1. Connect</h2>
      <p class="hint">
        Paste an API key (from <code>python scripts/provision_tenant.py</code>). The endpoints default to
        the local stack.
      </p>
      <label>API key <input id="apiKey" type="password" placeholder="cbir_..." /></label>
      <label>Catalog URL <input id="catalogUrl" value="http://localhost:8002" /></label>
      <label>Query URL <input id="queryUrl" value="http://localhost:8004" /></label>
      <button id="saveConn">Save</button>
      <span id="connStatus" class="status"></span>
    </section>

    <section class="card">
      <h2>2. Catalog</h2>
      <div class="row">
        <input type="file" id="uploadFile" accept="image/*" />
        <input id="uploadMeta" placeholder='metadata JSON e.g. {"category":"shoes"}' />
        <button id="uploadBtn">Upload &amp; index</button>
      </div>
      <button id="refreshBtn" class="secondary">Refresh list</button>
      <div id="catalogList" class="list"></div>
    </section>

    <section class="card">
      <h2>3. Search playground</h2>
      <div class="row">
        <input id="textQuery" placeholder="text query e.g. red running shoes" />
        <button id="textSearchBtn">Search by text</button>
      </div>
      <div class="row">
        <input type="file" id="imageQuery" accept="image/*" />
        <input id="modifier" placeholder="optional modifier e.g. in blue (compositional)" />
        <button id="imageSearchBtn">Search by image</button>
      </div>
      <div class="row">
        <input id="filters" placeholder='optional filters JSON e.g. {"category":"shoes"}' />
        <label class="inline">top&nbsp;K <input id="topK" type="number" value="10" min="1" max="100" /></label>
      </div>
      <div id="results" class="list"></div>
    </section>

    <script src="app.js"></script>
  </body>
</html>
