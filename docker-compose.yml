# -----------------------------------------------------------------------------
# Local development stack.
#
# Every service here speaks an open, portable protocol (Postgres wire protocol,
# Redis protocol, the S3 API) so that swapping the underlying implementation
# for a managed cloud service later never requires application code changes —
# only different connection values (see .env.example and infra/README.md).
#
# Usage:
#   cp .env.example .env
#   docker compose up --build
# -----------------------------------------------------------------------------

name: cbir-engine

services:

  # ---------------------------------------------------------------------------
  # PostgreSQL + pgvector.
  # System of record for tenants/catalog/billing metadata, and small-scale
  # vector search per docs/TECH_STACK.md. Production equivalent: Cloud SQL /
  # RDS / Azure Database for PostgreSQL — same wire protocol, no code changes.
  # ---------------------------------------------------------------------------
  postgres:
    image: pgvector/pgvector:pg16
    container_name: cbir-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-cbir}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cbir_local_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-cbir}
    # *_HOST_PORT vars control only the port published on the developer's
    # machine (change them to avoid host-port conflicts). Inside the Compose
    # network, every service always listens on its default port — which is
    # what the *_PORT vars passed to application services refer to.
    ports:
      - "${POSTGRES_HOST_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cbir} -d ${POSTGRES_DB:-cbir}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - cbir-network

  # ---------------------------------------------------------------------------
  # Redis.
  # Cache, task queue backend, and rate-limit counters (docs/ARCHITECTURE.md
  # Section 9). Production equivalent: Memorystore / ElastiCache / Azure Cache
  # for Redis.
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: cbir-redis
    restart: unless-stopped
    ports:
      - "${REDIS_HOST_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - cbir-network

  # ---------------------------------------------------------------------------
  # Qdrant.
  # Primary vector database for ANN search (docs/TECH_STACK.md Section 3).
  # Runs identically here, on a VM in any cloud, or as Qdrant Cloud —
  # self-hosted and never a proprietary vector API.
  # ---------------------------------------------------------------------------
  qdrant:
    image: qdrant/qdrant:v1.18.2
    container_name: cbir-qdrant
    restart: unless-stopped
    ports:
      - "${QDRANT_HTTP_HOST_PORT:-6333}:6333"
      - "${QDRANT_GRPC_HOST_PORT:-6334}:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'cat < /dev/null > /dev/tcp/127.0.0.1/6333'"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - cbir-network

  # ---------------------------------------------------------------------------
  # MinIO.
  # S3-API-compatible object storage — the local stand-in for GCS/S3/Azure
  # Blob. Because the application only ever speaks the S3 API contract
  # (never a cloud SDK's proprietary client), this is a drop-in swap for a
  # managed bucket in production.
  # ---------------------------------------------------------------------------
  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    container_name: cbir-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-cbir_minio_admin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-cbir_local_dev_password}
    ports:
      - "${MINIO_API_HOST_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_HOST_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - cbir-network

  # ---------------------------------------------------------------------------
  # auth-service (Milestone 2).
  # Tenant identity, API key lifecycle, access-token issuance, rate limiting.
  # Every other service validates credentials through this one. Its image is
  # built from the REPOSITORY ROOT context so it can bundle the shared/
  # packages (see services/auth-service/Dockerfile).
  # ---------------------------------------------------------------------------
  auth-service:
    build:
      context: .
      dockerfile: services/auth-service/Dockerfile
    container_name: cbir-auth-service
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-cbir}:${POSTGRES_PASSWORD:-cbir_local_dev_password}@${POSTGRES_HOST:-postgres}:${POSTGRES_PORT:-5432}/${POSTGRES_DB:-cbir}
      REDIS_URL: redis://${REDIS_HOST:-redis}:${REDIS_PORT:-6379}/0
      AUTH_JWT_SECRET: ${AUTH_JWT_SECRET:-local-dev-jwt-secret-not-for-production}
      AUTH_ADMIN_TOKEN: ${AUTH_ADMIN_TOKEN:-local-dev-admin-token}
    ports:
      - "${AUTH_SERVICE_HOST_PORT:-8001}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - cbir-network

  # ---------------------------------------------------------------------------
  # catalog-service (Milestone 3).
  # Catalog item metadata (PostgreSQL), raw images (MinIO via signed URLs),
  # right-to-erasure deletion. Validates credentials through auth-service.
  # S3_PRESIGN_ENDPOINT_URL is the host-reachable MinIO endpoint baked into
  # signed URLs handed to clients; S3_ENDPOINT_URL is how this container
  # reaches MinIO on the Compose network (see catalog-service README).
  # ---------------------------------------------------------------------------
  catalog-service:
    build:
      context: .
      dockerfile: services/catalog-service/Dockerfile
    container_name: cbir-catalog-service
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-cbir}:${POSTGRES_PASSWORD:-cbir_local_dev_password}@${POSTGRES_HOST:-postgres}:${POSTGRES_PORT:-5432}/${POSTGRES_DB:-cbir}
      AUTH_SERVICE_URL: http://auth-service:8000
      S3_ENDPOINT_URL: http://${MINIO_HOST:-minio}:${MINIO_API_PORT:-9000}
      S3_PRESIGN_ENDPOINT_URL: ${S3_PRESIGN_ENDPOINT_URL:-http://localhost:9000}
      S3_ACCESS_KEY: ${MINIO_ROOT_USER:-cbir_minio_admin}
      S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-cbir_local_dev_password}
      S3_BUCKET_NAME: ${S3_BUCKET_NAME:-cbir-catalog-images}
    ports:
      - "${CATALOG_SERVICE_HOST_PORT:-8002}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      auth-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - cbir-network

networks:
  cbir-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
  minio_data:
