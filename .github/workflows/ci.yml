# -----------------------------------------------------------------------------
# CI pipeline.
#
# Requires NO cloud account, credentials, or billing. Every step runs
# entirely on the GitHub-hosted runner using open-source tooling.
#
# Deliberately does NOT deploy anywhere. Cloud deployment is a future
# milestone (see docs/MILESTONES.md) built on top of the prepared-but-
# unexecuted infra/ directory.
#
# Stages: build/lint/test each Python package -> build service images ->
#         validate compose -> bring the stack up -> verify services start
#         and their readiness checks pass end to end.
# -----------------------------------------------------------------------------

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ---------------------------------------------------------------------------
  # Stage 1-3: build, lint/format, unit test — per package, in parallel.
  # Every service and shared package installs its own dev requirements (which
  # pull in the shared packages editable) and runs ruff + pytest. No
  # containers here, for fast feedback.
  # ---------------------------------------------------------------------------
  build-lint-test:
    name: Build, Lint & Test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package:
          - shared/domain-kernel
          - shared/common-libs
          - services/auth-service
          - services/catalog-service
          - ai-service
          - workers/ingestion-worker
          - services/query-service
          - sdks/python-sdk
          - infra/ci/quality-gates
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: ${{ matrix.package }}
        run: pip install --no-cache-dir -r requirements-dev.txt

      - name: Lint & format check (ruff)
        working-directory: ${{ matrix.package }}
        run: |
          ruff format --check .
          ruff check .

      - name: Run unit tests
        working-directory: ${{ matrix.package }}
        run: python -m pytest -q

  # ---------------------------------------------------------------------------
  # Stage 4-6: build the service images, validate docker-compose.yml, bring
  # the full local stack up, and verify every service starts and reports
  # ready. This exercises the real migrations (run on container start),
  # cross-service auth (catalog-service calling auth-service), and object
  # storage wiring.
  # ---------------------------------------------------------------------------
  containerize-and-verify:
    name: Build Images, Validate Compose & Verify Startup
    runs-on: ubuntu-latest
    needs: build-lint-test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Podman
        run: |
          sudo apt-get update
          sudo apt-get install -y podman

      - name: Build service images with Podman
        run: |
          podman build -f services/auth-service/Dockerfile -t auth-service:ci .
          podman build -f services/catalog-service/Dockerfile -t catalog-service:ci .
          podman build -f ai-service/Dockerfile -t ai-service:ci .
          podman build -f workers/ingestion-worker/Dockerfile -t ingestion-worker:ci .
          podman build -f services/query-service/Dockerfile -t query-service:ci .

      - name: Prepare .env for compose
        run: cp .env.example .env

      - name: Validate docker-compose.yml syntax
        run: docker compose config --quiet

      - name: Bring up the full local stack
        run: docker compose up -d --build

      - name: Wait for services to report healthy
        run: |
          # Only services WITH a healthcheck report a Health status. Block only
          # while something is still "starting" or "unhealthy"; services without
          # a healthcheck (worker, prometheus, grafana) have empty Health and
          # are not gated here (they are validated by the readiness/metrics
          # checks and the smoke test below).
          echo "Waiting for health-checked services (max 180s)..."
          for i in $(seq 1 36); do
            pending=$(docker compose ps --format '{{.Name}} {{.Health}}' | grep -E 'starting|unhealthy' || true)
            if [ -z "$pending" ]; then
              echo "All health-checked services are healthy."
              docker compose ps
              break
            fi
            echo "Still waiting... ($i/36)"
            sleep 5
            if [ "$i" -eq 36 ]; then
              echo "ERROR: services still not healthy after 180s:" >&2
              echo "$pending" >&2
              docker compose ps
              docker compose logs
              exit 1
            fi
          done

      - name: Verify service readiness (all dependencies reachable)
        run: |
          for port in 8001 8002 8003 8004; do
            echo "readyz :$port"
            curl -sf "http://localhost:${port}/readyz" | tee /dev/stderr | grep -q '"status":"ok"'
          done

      - name: Verify Prometheus metrics are exposed (Milestone 10)
        run: |
          for port in 8001 8002 8003 8004; do
            curl -sf "http://localhost:${port}/metrics" | grep -q 'http_requests_total'
          done
          # Prometheus scrapes every target successfully.
          sleep 20
          curl -sf 'http://localhost:9090/api/v1/targets' | grep -q '"health":"up"'

      - name: Smoke-test the full ingest -> index -> search pipeline
        run: python scripts/smoke_pipeline.py

      - name: Retrieval-quality regression gate (Milestone 12)
        run: python infra/ci/quality-gates/retrieval_quality.py --k 10

      - name: Dump logs on failure
        if: failure()
        run: docker compose logs

      - name: Tear down the stack
        if: always()
        run: docker compose down -v

  # ---------------------------------------------------------------------------
  # Explicitly NOT a job in this pipeline (documented so its absence is
  # visible and intentional):
  #
  #   deploy-to-gcp:
  #     ... terraform init/plan/apply against infra/terraform/environments/production-gcp ...
  #
  # Cloud deployment is deferred to a future milestone once the application
  # is production-ready. No cloud credentials are stored as GitHub Secrets
  # for this repository at this stage. See infra/README.md and
  # docs/MILESTONES.md.
  # ---------------------------------------------------------------------------
