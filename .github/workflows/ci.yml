# -----------------------------------------------------------------------------
# CI pipeline — Milestone 1 scope.
#
# Requires NO cloud account, credentials, or billing. Every step runs
# entirely on the GitHub-hosted runner using open-source tooling.
#
# Deliberately does NOT deploy anywhere. Cloud deployment is a future
# milestone (see docs/MILESTONES.md) built on top of the prepared-but-
# unexecuted infra/ directory.
#
# Stages: build -> lint/format -> test -> build docker image ->
#         validate compose -> verify application starts correctly
# -----------------------------------------------------------------------------

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same branch/PR to save CI minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ---------------------------------------------------------------------------
  # Stage 1-3: build, lint/format, unit test.
  # Runs directly on the runner (no containers yet) for fast feedback --
  # no reason to pay the container-build cost before we know the code itself
  # is even correctly formatted and passing tests.
  # ---------------------------------------------------------------------------
  build-lint-test:
    name: Build, Lint & Test (hello-world-service)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: hello-world-service/requirements-dev.txt

      - name: Install dependencies (build)
        working-directory: hello-world-service
        run: pip install --no-cache-dir -r requirements-dev.txt

      - name: Lint & format check (ruff)
        working-directory: hello-world-service
        run: |
          ruff format --check .
          ruff check .

      - name: Run unit tests
        working-directory: hello-world-service
        run: python -m pytest -v

  # ---------------------------------------------------------------------------
  # Stage 4-6: build the Docker image, validate docker-compose.yml, then
  # actually bring the full local stack up and verify it starts correctly.
  #
  # Runs after build-lint-test so we don't waste time containerizing code
  # that doesn't even pass tests. Uses Podman for the OCI image build itself
  # (per docs/TECH_STACK.md's CI/production containerization decision:
  # rootless, daemonless, no licensing exposure), and the Docker Compose CLI
  # (pre-installed on GitHub-hosted runners) to validate and run the actual
  # docker-compose.yml, since that file is the artifact local developers
  # interact with directly and should be validated as such.
  # ---------------------------------------------------------------------------
  containerize-and-verify:
    name: Build Image, Validate Compose & Verify Startup
    runs-on: ubuntu-latest
    needs: build-lint-test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Podman
        run: |
          sudo apt-get update
          sudo apt-get install -y podman

      - name: Build hello-world-service image with Podman
        working-directory: hello-world-service
        run: podman build -t hello-world-service:ci .

      - name: Prepare .env for compose
        run: cp .env.example .env

      - name: Validate docker-compose.yml syntax
        run: docker compose config --quiet

      - name: Bring up the full local stack
        run: docker compose up -d --build

      - name: Wait for services to report healthy
        run: |
          echo "Waiting for all services to become healthy (max 90s)..."
          for i in $(seq 1 18); do
            unhealthy=$(docker compose ps --format '{{.Name}} {{.Health}}' | grep -v "healthy" | grep -v "^$" || true)
            if [ -z "$unhealthy" ]; then
              echo "All services healthy."
              docker compose ps
              exit 0
            fi
            echo "Still waiting... ($i/18)"
            sleep 5
          done
          echo "ERROR: services still unhealthy after 90s:" >&2
          echo "$unhealthy" >&2
          docker compose ps
          exit 1

      - name: Verify application starts correctly (liveness)
        run: |
          curl -sf http://localhost:8000/health | tee /dev/stderr | grep -q '"status":"ok"'

      - name: Verify application starts correctly (readiness — full stack wiring)
        run: |
          curl -sf http://localhost:8000/readyz | tee /dev/stderr | grep -q '"status":"ok"'

      - name: Dump logs on failure
        if: failure()
        run: docker compose logs

      - name: Tear down the stack
        if: always()
        run: docker compose down -v

  # ---------------------------------------------------------------------------
  # Explicitly NOT a job in this pipeline (documented here so its absence is
  # visible and intentional, not an oversight):
  #
  #   deploy-to-gcp:
  #     ... terraform init/plan/apply against infra/terraform/environments/production-gcp ...
  #
  # Cloud deployment is deferred to a future milestone once the application
  # is production-ready. No cloud credentials are stored as GitHub Secrets
  # for this repository at this stage. See infra/README.md and
  # docs/MILESTONES.md.
  # ---------------------------------------------------------------------------
