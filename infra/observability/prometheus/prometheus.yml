# Prometheus scrape configuration for the local stack (Milestone 10).
# Every FastAPI service exposes /metrics on its container port 8000; the
# ingestion worker (no HTTP API) exposes /metrics on 9100.
global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: auth-service
    static_configs:
      - targets: ["auth-service:8000"]
  - job_name: catalog-service
    static_configs:
      - targets: ["catalog-service:8000"]
  - job_name: ai-service
    static_configs:
      - targets: ["ai-service:8000"]
  - job_name: query-service
    static_configs:
      - targets: ["query-service:8000"]
  - job_name: ingestion-worker
    static_configs:
      - targets: ["ingestion-worker:9100"]
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
