# catalog-service (Milestone 3). Cloud-agnostic base manifest.
# Config/secrets (DATABASE_URL, S3_* credentials, AUTH_SERVICE_URL) come from
# a Secret named cbir-catalog-secrets, created out-of-band per environment.
# Not applied to any cluster yet (infra is prepared-but-dormant).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: catalog-service
  namespace: cbir-engine
  labels:
    app.kubernetes.io/name: catalog-service
    app.kubernetes.io/part-of: cbir-engine
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: catalog-service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: catalog-service
    spec:
      containers:
        - name: catalog-service
          image: catalog-service:latest # Replaced by the CI-built tag once a real deploy exists.
          ports:
            - containerPort: 8000
          env:
            - name: AUTH_SERVICE_URL
              value: "http://auth-service.cbir-engine.svc.cluster.local"
          envFrom:
            - secretRef:
                name: cbir-catalog-secrets
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: catalog-service
  namespace: cbir-engine
spec:
  selector:
    app.kubernetes.io/name: catalog-service
  ports:
    - port: 80
      targetPort: 8000
