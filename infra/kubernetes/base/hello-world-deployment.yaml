# Temporary manifest, mirroring hello-world-service's role in
# docker-compose.yml: proves the Kubernetes deployment path works, once it is
# actually exercised in a future milestone. Not applied to any cluster during
# Milestone 1.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hello-world-service
  namespace: cbir-engine
  labels:
    app.kubernetes.io/name: hello-world-service
    app.kubernetes.io/part-of: cbir-engine
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: hello-world-service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: hello-world-service
    spec:
      containers:
        - name: hello-world-service
          image: hello-world-service:latest # Replaced by CI-built image tag once a real deploy exists.
          ports:
            - containerPort: 8000
          env:
            - name: SERVICE_NAME
              value: "hello-world-service"
            - name: SERVICE_VERSION
              value: "0.1.0"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: hello-world-service
  namespace: cbir-engine
spec:
  selector:
    app.kubernetes.io/name: hello-world-service
  ports:
    - port: 80
      targetPort: 8000
