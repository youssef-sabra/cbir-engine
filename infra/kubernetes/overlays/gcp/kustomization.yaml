# GKE-specific overlay. Isolates the genuinely cloud-specific pieces
# (ingress class, storage class) from the cloud-agnostic base manifests, per
# docs/CLEAN_ARCHITECTURE.md's infra/kubernetes/ design.
#
# Not applied to any cluster during Milestone 1.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

patches:
  # Placeholder patch target -- populated once a real Ingress resource exists
  # (post-Milestone 1). Left here to document where GKE-specific annotations
  # (e.g. kubernetes.io/ingress.class: "gce") would be applied via Kustomize
  # rather than duplicating the whole manifest.
  - target:
      kind: Deployment
      name: hello-world-service
    patch: |-
      - op: add
        path: /metadata/annotations
        value:
          cbir.dev/target-cloud: "gcp"
